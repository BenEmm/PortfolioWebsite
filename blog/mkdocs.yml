site_name: Ben McLeod
site_description: Practical IT notes from Ben McLeod covering Windows, productivity, infrastructure, and support.
site_author: Ben McLeod
site_url: https://blog.ben-mcleod.com/
site_dir: ../blog/site
docs_dir: ../blog/docs

theme:
  name: material
  favicon: assets/images/blog-favicon.svg
  icon:
    logo: material/newspaper-variant-outline
  features:
    - navigation.sections
  palette:
    - scheme: default
      primary: custom
      accent: custom

extra_css:
  - stylesheets/portfolio-theme.css

plugins:
  - blog:
      blog_dir: .
  - search
  - tags

nav:
  - index.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/BenEmm
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ben-mcleod/

copyright: Copyright &copy; 2026 Ben McLeod
